name: ✨ Feature Request
description: 提议一个新特性 / Suggest a new feature
title: '[Feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题 / What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你的建议 / Your proposal
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案 / Alternatives considered

  - type: textarea
    id: extra
    attributes:
      label: 其他信息 / Anything else?

  - type: checkboxes
    id: acks
    attributes:
      label: 确认 / Acknowledgements
      options:
        - label: 我已搜索过现有 issue，没有相同的提议
          required: true
        - label: 这个特性符合 dramai "纯前端 / 零后端" 的核心定位
          required: false
