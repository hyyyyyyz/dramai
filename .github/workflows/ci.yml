name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # We use `npm install` rather than `npm ci` because npm 11 occasionally
      # produces lockfiles with missing platform-optional packages
      # (notably @emnapi/* under @napi-rs/wasm-runtime). `npm install`
      # tolerates this; `npm ci` does not. .npmrc pins include=optional
      # to keep drift minimal.
      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
