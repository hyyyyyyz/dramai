name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # See ci.yml for the rationale on `npm install` vs `npm ci`.
      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /dramai/

      # SPA 路由兜底：把 index.html 复制成 404.html，
      # 这样 GitHub Pages 在子路径刷新时会回到 SPA。
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll (avoid `_files` munging)
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
